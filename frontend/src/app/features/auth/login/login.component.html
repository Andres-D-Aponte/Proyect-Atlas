<div class="login-page">
  <app-theme-toggle class="theme-toggle-corner" />

  <form class="login-card" [formGroup]="form" (ngSubmit)="submit()">
    <div class="brand-mark-lg">A</div>
    <h1>Atlas</h1>
    <p class="subtitle">Inicia sesión para continuar</p>

    <label>
      Correo
      <input type="email" formControlName="email" autocomplete="username" placeholder="tú@empresa.com" />
      @if (form.controls.email.invalid && form.controls.email.touched) {
        <span class="field-error">
          @if (form.controls.email.hasError('required')) {
            El correo es obligatorio.
          } @else {
            El correo no tiene un formato válido.
          }
        </span>
      }
    </label>

    <label>
      Contraseña
      <input type="password" formControlName="password" autocomplete="current-password" placeholder="••••••••" />
      @if (form.controls.password.invalid && form.controls.password.touched) {
        <span class="field-error">La contraseña es obligatoria.</span>
      }
    </label>

    <button type="submit" [disabled]="submitting()">
      @if (submitting()) {
        <span class="spinner"></span> Ingresando…
      } @else {
        Ingresar
      }
    </button>
  </form>
</div>
