<div class="login-page">
  <app-theme-toggle class="theme-toggle-corner" />

  <form class="login-card" [formGroup]="form" (ngSubmit)="submit()">
    <div class="brand-mark-lg">A</div>
    <h1>Atlas</h1>
    <p class="subtitle">Inicia sesión para continuar</p>

    <label>
      Correo
      <input type="email" formControlName="email" autocomplete="username" placeholder="tú@empresa.com" />
    </label>

    <label>
      Contraseña
      <input type="password" formControlName="password" autocomplete="current-password" placeholder="••••••••" />
    </label>

    @if (errorMessage()) {
      <p class="error">{{ errorMessage() }}</p>
    }

    <button type="submit" [disabled]="submitting()">
      @if (submitting()) {
        <span class="spinner"></span> Ingresando…
      } @else {
        Ingresar
      }
    </button>
  </form>
</div>
