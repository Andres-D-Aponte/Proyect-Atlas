<app-shell
  title="Configuración"
  [subtitle]="companyName"
  [userEmail]="authService.currentUser()?.email ?? null"
  [showLogout]="true"
  (logout)="logout()"
  [impersonating]="authService.isImpersonating()"
  (exitImpersonation)="exitImpersonation()"
>
  <nav class="tabs" shell-tabs>
    <a routerLink="/settings/company" routerLinkActive="active">Empresa</a>
    <a routerLink="/settings/branches" routerLinkActive="active">Sucursales</a>
    <a routerLink="/settings/users" routerLinkActive="active">Usuarios</a>
    <a routerLink="/settings/services" routerLinkActive="active">Servicios</a>
    <a routerLink="/clients" routerLinkActive="active">Clientes</a>
  </nav>

  @if (loading()) {
    <p><span class="spinner"></span> Cargando…</p>
  } @else {
    <form class="settings-form card" [formGroup]="form" (ngSubmit)="save()">
      <label>
        Logo (URL)
        <input type="text" formControlName="logoUrl" placeholder="https://…" />
      </label>

      <label>
        Color principal
        <div class="color-field">
          <input type="color" formControlName="primaryColor" />
          <span class="color-hex">{{ form.controls.primaryColor.value }}</span>
        </div>
      </label>

      <label>
        Zona horaria
        <select formControlName="timezone">
          @for (option of timezoneOptions; track option.value) {
            <option [value]="option.value">{{ option.label }}</option>
          }
        </select>
      </label>

      <label>
        Moneda
        <select formControlName="currency">
          @for (option of currencyOptions; track option.value) {
            <option [value]="option.value">{{ option.label }}</option>
          }
        </select>
      </label>

      <label>
        Idioma
        <select formControlName="language">
          @for (option of languageOptions; track option.value) {
            <option [value]="option.value">{{ option.label }}</option>
          }
        </select>
      </label>

      <fieldset>
        <legend>Métodos de pago habilitados</legend>
        <div class="checkbox-grid">
          @for (method of allPaymentMethods; track method) {
            <label class="checkbox">
              <input
                type="checkbox"
                [checked]="isPaymentMethodEnabled(method)"
                (change)="togglePaymentMethod(method, $any($event.target).checked)"
              />
              {{ paymentMethodLabels[method] }}
            </label>
          }
        </div>
      </fieldset>

      <fieldset>
        <legend>Clientes</legend>
        <div class="checkbox-grid">
          <label class="checkbox">
            <input type="checkbox" formControlName="requireClientEmail" />
            Exigir correo al registrar un cliente
          </label>
          <label class="checkbox">
            <input type="checkbox" formControlName="requireClientDocument" />
            Exigir documento al registrar un cliente
          </label>
          <label class="checkbox">
            <input type="checkbox" formControlName="requireClientAddress" />
            Exigir dirección al registrar un cliente
          </label>
          <label class="checkbox">
            <input type="checkbox" formControlName="allowBookingWithoutClient" />
            Permitir reservas sin cliente registrado
          </label>
        </div>
      </fieldset>

      @if (savedMessage()) {
        <p class="success">✓ {{ savedMessage() }}</p>
      }

      <button type="submit" [disabled]="saving()">
        @if (saving()) {
          <span class="spinner"></span> Guardando…
        } @else {
          Guardar cambios
        }
      </button>
    </form>
  }
</app-shell>
