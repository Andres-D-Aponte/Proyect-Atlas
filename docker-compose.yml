services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas_dev_password
      POSTGRES_DB: atlas
    ports:
      # 5433 en el host: evita chocar con un PostgreSQL nativo que ya use 5432.
      # El tráfico interno entre contenedores sigue usando postgres:5432.
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U atlas -d atlas']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://atlas:atlas_dev_password@postgres:5432/atlas?schema=public
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_generated:/app/generated
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma generate && npm run start:dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '4200:4200'
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: npm start -- --host 0.0.0.0 --poll 2000

volumes:
  postgres_data:
  backend_node_modules:
  backend_generated:
  frontend_node_modules:
